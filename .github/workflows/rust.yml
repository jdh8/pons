name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Check formatting
      run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build docs
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --no-deps --all-features

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.93"]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust ${{ matrix.rust }}
      run: rustup toolchain install ${{ matrix.rust }} --profile minimal && rustup default ${{ matrix.rust }}
    - name: Test (all features)
      run: cargo test --all-features --verbose

  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: cargo-deny
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check bans sources licenses

  miri:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install nightly with Miri
      run: rustup toolchain install nightly --profile minimal --component miri && rustup default nightly
    - name: Miri test (skips FFI-dependent solver test)
      env:
        MIRIFLAGS: -Zmiri-disable-isolation
      run: cargo miri test --all-features
