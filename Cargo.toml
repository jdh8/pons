[package]
name = "pons"
version = "0.6.0-dev"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
description = "Rust package for contract bridge"
repository = "https://github.com/jdh8/pons"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge"]

[dependencies]
bitflags = "2"
dds-bridge = "0.15"
rand = "0.10"
thiserror = "2"

[dev-dependencies]
anyhow = "1"
approx = "0.5"
clap = { version = "4", features = ["derive"] }
dds-bridge-sys = "2"
nalgebra = "0.34"
