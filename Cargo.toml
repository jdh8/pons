[package]
name = "pons"
version = "0.10.0"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
rust-version = "1.93"
description = "Rust package for contract bridge"
repository = "https://github.com/jdh8/pons"
homepage = "https://github.com/jdh8/pons"
documentation = "https://docs.rs/pons"
readme = "README.md"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge"]
# The off-crate distillation trainer is a separate workspace and is already
# skipped by `cargo package`; exclude it explicitly so it stays out of the
# published tarball even if it were ever made a workspace member.
exclude = ["trainer"]

[package.metadata.docs.rs]
all-features = true

[features]
serde = ["dep:serde", "dep:serde_with", "contract-bridge/serde", "ddss/serde", "bitflags/serde"]
# Distilled neural floor (AI-bidder M1.2): embeds the trained weights and a
# hand-rolled forward pass. Off by default so the standard build stays lean and
# dependency-free — the weights are `include_bytes!`d, no ML runtime is pulled in.
neural-floor = []
# Gated live double-dummy search bidder (AI-bidder M2.3): at each non-forced
# decision it shortlists the net's top calls, scores them by cardplay EV over
# sampled layouts (the M2.2 evaluator), and bids the best. Slow and off by
# default; implies `neural-floor` for the prior net and the forced-rails shell.
search = ["neural-floor"]

[dependencies]
bitflags = "2"
contract-bridge = { version = "0.1.3", features = ["rand"] }
ddss = "0.1.2"
# Already compiled transitively via contract-bridge's `rand` feature; named here
# directly so the constrained sampler (AI-bidder M2.1) can take the caller's RNG.
rand = "0.10"
serde = { version = "1", features = ["derive"], optional = true }
serde_with = { version = "3", default-features = false, features = ["macros"], optional = true }
thiserror = "2"

[dev-dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
# AI-bidder Side-track S: the `bba-oracle` example dlopens the proprietary
# native EPBot library (git-ignored under vendor/) to drive it as a reference
# bidder. Dev-only — never part of the published default build.
libloading = "0.8"
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
nalgebra = "0.35"
proptest = { version = "1", default-features = false, features = ["std"] }
serde_json = "1"

[[bench]]
name = "shuffle"
harness = false

[[bench]]
name = "trie"
harness = false

[[bench]]
name = "par"
harness = false

# The neural-floor A/B example (AI-bidder M1.4) imports `neural-floor`-gated
# items, so it builds only with that feature — otherwise `cargo build --examples`
# would fail to resolve `two_over_one_neural`. Every other example is still
# auto-discovered.
[[example]]
name = "neural-floor"
path = "examples/neural-floor/main.rs"
required-features = ["neural-floor"]

# The live-search A/B example (AI-bidder M2.3) imports `search`-gated items
# (`two_over_one_search`), so it builds only with that feature.
[[example]]
name = "search-floor"
path = "examples/search-floor/main.rs"
required-features = ["search"]

# The search-target dump (AI-bidder M3.1) bids out boards with the live-search
# floor (`two_over_one_search_with`) to record distillation targets, so it too
# builds only with the `search` feature.
[[example]]
name = "search-dump"
path = "examples/search-dump/main.rs"
required-features = ["search"]

[profile.dev.package."*"]
opt-level = 2
