[package]
name = "pons"
version = "0.6.0-dev"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
rust-version = "1.93"
description = "Rust package for contract bridge"
repository = "https://github.com/jdh8/pons"
homepage = "https://github.com/jdh8/pons"
documentation = "https://docs.rs/pons"
readme = "README.md"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge"]

[features]
serde = ["dep:serde", "dds-bridge/serde", "bitflags/serde"]

[dependencies]
bitflags = "2"
dds-bridge = "0.16"
rand = "0.10"
serde = { version = "1", features = ["derive"], optional = true }
thiserror = "2"

[dev-dependencies]
anyhow = "1"
approx = "0.5"
clap = { version = "4", features = ["derive"] }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
dds-bridge-sys = "2"
nalgebra = "0.34"
serde_json = "1"

[[bench]]
name = "shuffle"
harness = false

[[bench]]
name = "trie"
harness = false

[[bench]]
name = "par"
harness = false
