[package]
name = "pons"
version = "0.6.0-dev"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
description = "Rust package for contract bridge"
repository = "https://github.com/jdh8/pons"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge"]

[dependencies]
arrayvec = "0.7.6"
bitflags = "2.11.0"
dds-bridge = "0.14.0"
rand = "0.10.1"
thiserror = "2.0.18"

[dev-dependencies]
anyhow = "1.0.102"
approx = "0.5.1"
clap = { version = "4.6.0", features = ["derive"] }
dds-bridge-sys = "2.0.4"
nalgebra = "0.34.2"
