[package]
name = "pons"
version = "0.9.0-dev"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
rust-version = "1.93"
description = "Rust package for contract bridge"
repository = "https://github.com/jdh8/pons"
homepage = "https://github.com/jdh8/pons"
documentation = "https://docs.rs/pons"
readme = "README.md"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge"]

[features]
serde = ["dep:serde", "dep:serde_with", "contract-bridge/serde", "ddss/serde", "bitflags/serde"]

[dependencies]
bitflags = "2"
contract-bridge = { version = "0.1.1", features = ["rand"] }
ddss = "0.1.2"
serde = { version = "1", features = ["derive"], optional = true }
serde_with = { version = "3", default-features = false, features = ["macros"], optional = true }
thiserror = "2"

[dev-dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }
nalgebra = "0.34"
proptest = { version = "1", default-features = false, features = ["std"] }
rand = "0.10"
serde_json = "1"

[[bench]]
name = "shuffle"
harness = false

[[bench]]
name = "trie"
harness = false

[[bench]]
name = "par"
harness = false

[profile.dev.package."*"]
opt-level = 2